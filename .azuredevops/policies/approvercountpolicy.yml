name: approver_count
description: Approver count policy for msazure/ContainerPlatform/Microsoft.hcsshim repository
resource: repository
where: 
configuration:
  approverCountPolicySettings:
    isBlocking: true
    requireMinimumApproverCount: 1
    creatorVoteCounts: false
    allowDownvotes: false
    sourcePushOptions:
      resetOnSourcePush: false
      requireVoteOnLastIteration: true
      requireVoteOnEachIteration: false
      resetRejectionsOnSourcePush: false
    blockLastPusherVote: true
    branchNames:
    - refs/heads/main
    - refs/heads/release/conf-aci/0.2
    displayName: msazure/ContainerPlatform/Microsoft.hcsshim Approver Count Policy
